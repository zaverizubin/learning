# the below integrates JobRunr with Spring Actuator Metrics.
# best is to only enable it on your server that has the dashboard running
# metrics are available at http://localhost:8080/actuator/metrics/jobrunr.jobs.by-state?tag=state:SUCCEEDED
# if you also included the micrometer-registry-prometheus dependency, they can be scraped at http://localhost:8080/actuator/prometheus
jobrunr.jobs.metrics.enabled=true
